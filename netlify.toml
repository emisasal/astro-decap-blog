[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Decap CMS SPA — only rewrite paths that are not static files (Netlify shadowing
# serves /admin/index.html and /cms/config.yml directly when they exist in dist/)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Netlify Identity — required for private /admin access in production
# Enable in Netlify dashboard: Site settings → Identity → Enable Identity
# Then enable Git Gateway: Identity → Services → Git Gateway → Enable
